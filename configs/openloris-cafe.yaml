# OpenLORIS cafe scenes (Segway robot): laser + RGB-D + d400 IMU, rig from /tf_static.
# Usage: slam-replay --baseline scan-matching-3d --bag cafe1-1.bag --config configs/openloris-cafe.yaml …
rig:
  source: bag
sensors:
  odometry:
    - topic: /odom
  scans:
    - topic: /scan
  imus:
    - gyro_topic: /d400/gyro/sample
      accel_topic: /d400/accel/sample
  depth:
    - topic: /d400/aligned_depth_to_color/image_raw
      min_range: 0.3
      max_range: 6.0
      every_nth: 3
