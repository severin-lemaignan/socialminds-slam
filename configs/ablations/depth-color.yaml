# Sensor-set ablation config (harness.sensor_matrix): depth + colour, NO masking.
# Control for the masking A/B — attributes any trajectory change caused by the
# colour pairing itself (the masked configs add `color:`, plain depth.yaml has none).
rig: {source: bag}
sensors:
  depth:
    - topic: /d400/aligned_depth_to_color/image_raw
      color: /d400/color/image_raw
      every_nth: 3
