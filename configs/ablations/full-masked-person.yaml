# Masking A/B: the full cafe sensor set (openloris-cafe.yaml) with person-only
# masking — the bridge-unlock candidate if the dynamic class set over-masks
# static café furniture.
rig:
  source: bag
sensors:
  odometry:
    - topic: /odom
  scans:
    - topic: /scan
  imus:
    - gyro_topic: /d400/gyro/sample
      accel_topic: /d400/accel/sample
  depth:
    - topic: /d400/aligned_depth_to_color/image_raw
      color: /d400/color/image_raw # also feeds the mask model
      min_range: 0.3
      max_range: 6.0
      every_nth: 3
masking:
  model: onnx/yolo11s-seg-rect.onnx
  conf: 0.2
  dilate_px: 8
  classes: person
