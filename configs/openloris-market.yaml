# OpenLORIS market scenes (Scrubber 75 robot): NO 2D laser in these bags — depth + IMU
# only (the depth-only registration limits are tracked in TODO.md).
rig:
  source: bag
sensors:
  odometry:
    - topic: /odom
  imus:
    - gyro_topic: /d400/gyro/sample
      accel_topic: /d400/accel/sample
  depth:
    - topic: /d400/aligned_depth_to_color/image_raw
      color: /d400/color/image_raw # per-point RGB → coloured 3D map in rerun
      every_nth: 3
