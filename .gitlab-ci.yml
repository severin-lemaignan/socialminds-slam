# GitLab CI — CPU-only, GPU-free, ROS-free.
#
# The entire pipeline must pass on a standard shared runner (ADR 0003): no job here may
# require a GPU or a dataset download. The toolchain version is pinned by
# rust-toolchain.toml; the image only needs to be >= that.

stages:
  - test

variables:
  CARGO_TERM_COLOR: always
  # Keep Cargo's caches inside the project so GitLab can cache them between runs.
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTFLAGS: "-D warnings"

default:
  image: rust:1.94-bookworm
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

# Rust: formatting, lints (warnings are errors), and the full test suite.
rust:checks:
  stage: test
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo test --workspace

# End-to-end evaluation: build the engine binaries, run the Python harness unit tests,
# then the gated self-test benchmark (synthesize -> run -> score -> gate). No GPU, no
# download.
eval:benchmark:
  stage: test
  script:
    - cargo build --release -p slam-replay -p slam-datasets
    - apt-get update && apt-get install -y --no-install-recommends python3 python3-venv
    - python3 -m venv eval/.venv
    - . eval/.venv/bin/activate
    - pip install --upgrade pip
    - pip install -r eval/requirements.txt
    - export SLAM_REPLAY_BIN="$CI_PROJECT_DIR/target/release/slam-replay"
    - export SLAM_BAG2IMU_BIN="$CI_PROJECT_DIR/target/release/slam-bag2imu"
    - cd eval && python -m pytest
    - python -m harness.selftest
