# GitLab CI — CPU-only, GPU-free, ROS-free.
#
# The entire pipeline must pass on a standard shared runner (ADR 0003): no job here may
# require a GPU or a dataset download. The toolchain version is pinned by
# rust-toolchain.toml; the image only needs to be >= that.

stages:
  - test

variables:
  CARGO_TERM_COLOR: always
  # Keep Cargo's caches inside the project so GitLab can cache them between runs.
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTFLAGS: "-D warnings"
  # GTSAM is vendored as a pinned shallow submodule (third_party/gtsam, ADR 0001) and
  # built CPU-only by slam-gtsam-sys's build script; the target/ cache keeps it warm.
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 1

default:
  image: rust:1.94-bookworm
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

# Rust: formatting, lints (warnings are errors), and the full test suite.
# cmake builds the vendored GTSAM (first run ~tens of minutes on a shared runner;
# cached in target/ afterwards).
rust:checks:
  stage: test
  script:
    - apt-get update && apt-get install -y --no-install-recommends cmake
    - rustup component add rustfmt clippy
    - cargo fmt --all --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo test --workspace
    # The feature-gated rerun viz path must not bit-rot (ADR 0011); check-only.
    - cargo check -p slam-replay --features viz
    # Same for the dynamics-masking path (ADR 0015). The slam-dynamics crate itself
    # is a workspace member, so `cargo test --workspace` above already ran real
    # CPU-EP inference against the committed onnx/yolo11s-seg-rect.onnx.
    - cargo check -p slam-replay --features dynamics

# End-to-end evaluation: build the engine binaries, run the Python harness unit tests,
# then the gated self-test benchmark (synthesize -> run -> score -> gate). No GPU, no
# download.
eval:benchmark:
  stage: test
  script:
    # cmake builds the vendored GTSAM (slam-gtsam-sys) pulled in by slam-replay.
    - apt-get update && apt-get install -y --no-install-recommends cmake python3 python3-venv
    - cargo build --release -p slam-replay -p slam-datasets
    - python3 -m venv eval/.venv
    - . eval/.venv/bin/activate
    - pip install --upgrade pip
    - pip install -r eval/requirements.txt
    - export SLAM_REPLAY_BIN="$CI_PROJECT_DIR/target/release/slam-replay"
    - export SLAM_BAG2IMU_BIN="$CI_PROJECT_DIR/target/release/slam-bag2imu"
    - cd eval && python -m pytest
    - python -m harness.selftest
    - python -m harness.benchmark --out-dir results
  artifacts:
    when: always
    paths:
      - eval/results/report.md
      - eval/results/results.json
    expire_in: 30 days
